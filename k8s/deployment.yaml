apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-node-k8s-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-node-k8s-app
  template:
    metadata:
      labels:
        app: my-node-k8s-app
    spec:
      containers:
      - name: my-node-k8s-app
        image: my-node-k8s-app:latest  # your Docker Hub image
        imagePullPolicy: Never
        ports:
        - containerPort: 3000